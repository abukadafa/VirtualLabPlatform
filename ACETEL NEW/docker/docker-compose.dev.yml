services:
  # MongoDB for Application Data
  mongodb:
    image: mongo:latest
    container_name: virtuallab-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-dev-data:/data/db
    networks:
      - virtuallab-network

  # Backend Server
  server:
    image: node:20-alpine
    container_name: virtuallab-server
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/virtuallab
      - REDIS_HOST=redis
      - JWT_SECRET=your-secret-key-change-in-production
      - NODE_ENV=development
    depends_on:
      - mongodb
      - redis
    networks:
      - virtuallab-network
    volumes:
      - ../server:/app
      - /app/node_modules

  # Redis for Queue Management
  redis:
    image: redis:alpine
    container_name: virtuallab-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - virtuallab-network

  # Frontend Client (Development)
  client:
    image: node:20-alpine
    container_name: virtuallab-client
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ../client:/app
      - /app/node_modules
    networks:
      - virtuallab-network
    depends_on:
      - server

networks:
  virtuallab-network:
    driver: bridge

volumes:
  mongodb-dev-data:
